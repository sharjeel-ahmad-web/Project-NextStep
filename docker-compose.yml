# Run from repo root:  docker compose up --build -d
# Frontend: http://localhost:3000  |  API: http://localhost:8000/api  |  Health: http://localhost:8000/api/health

name: nextstep

services:
  mongodb:
    image: mongo:7.0
    container_name: nextstep_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: nextstep_db
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - nextstep_network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextstep_backend
    restart: unless-stopped
    working_dir: /app
    environment:
      APP_NAME: NextStep
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mongodb
      DB_HOST: mongodb
      DB_PORT: 27017
      DB_DATABASE: nextstep_db
      FRONTEND_URL: http://localhost:3000
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: local
      MAIL_MAILER: smtp
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: f1acfc6b873716
      MAIL_PASSWORD: 95acf276a7b17c
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
      - ./backend/bootstrap/cache:/app/bootstrap/cache
      - ./backend/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - nextstep_network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextstep_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      NODE_ENV: development
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - nextstep_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5173" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  nextstep_network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  frontend_node_modules:
